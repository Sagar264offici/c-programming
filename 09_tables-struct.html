<!DOCTYPE html>
<html>
<head>
   
    <title>Table structure</title>
</head>
<body>
    
    <table border="1"
    cellpadding="10"
    cellspacing="0"
    style="border-collapse: collapse;"></table>
    <tr><th>Name</th>
    <th>Age</th>
<th>Occupation</th>
</tr>
<tr>
   <td>John</td>
   <td>25</td>
   <td>Engineer</td>
 
</tr>
</table>
</body>
</html>
